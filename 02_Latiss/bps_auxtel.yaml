pipelineYaml: 'simpleisrtask.yaml'

# Just names, but UPDATE THIS AND KEEP THEM SHORT
project: AuxtelSpec
campaign: SPECTRO-2026

# UPDATE THESE arguments to mirror the ones you use with command-line pipetask run
payload:
  payloadName: 'auxtel_run_2026'
  butlerConfig: /repo/main
  inCollection: LATISS/raw/all,refcats,LATISS/calib/legacy,LATISS/calib
  dataQuery: "instrument='LATISS' AND (exposure.day_obs>=20250101) AND physical_filter IN ('empty~holo4_003','BG40~holo4_003','FELH0600~holo4_003','SDSSr~holo4_003','BG40_65mm_1~holo4_003','OG550_65mm_1~holo4_003') AND exposure.observation_type='science'"       
  runPreCmdOpts: --long-log --log-level timer.lsst.resources=INFO 

#wmsServiceClass: lsst.ctrl.bps.parsl.ParslService
wmsServiceClass: lsst.ctrl.bps.htcondor.HTCondorService
computeSite: s3df

parsl:
  log_level: INFO

requestMemory: 8192      # now each job will ask for 8 GiB of memory
pipetask:
  makeWarp:
    requestMemory: 8192  # but jobs running 'makeWrap' will ask for even more (8 GiB) 

site:
  s3df:
    profile:
      condor:
        +Walltime: 7200
  slurm:
    class: lsst.ctrl.bps.parsl.sites.Slurm
    nodes: 32
    walltime: '24:00:00'     # This is 24 hours
    cores_per_node: 48
    qos: normal
    scheduler_options: |
      #SBATCH --partition=roma,milano
      #SBATCH --exclusive
      #SBATCH --account=rubin
  triple_slurm:
    class: lsst.ctrl.bps.parsl.sites.TripleSlurm
    nodes: 1
    cores_per_node: 100
    qos: normal
    small_memory: 2.0     # Units are GB
    medium_memory: 4.0
    large_memory: 8.0
    small_walltime: '10.0'   # Units are hours
    medium_walltime: '10.0'
    large_walltime: '40.0'        
  work_queue:
    class: lsst.ctrl.bps.parsl.sites.work_queue.LocalSrunWorkQueue
    worker_options: "--memory=480000"   # work_queue expects memory in MB
    nodes_per_block: 10

    monitorEnable: true
    monitorFilename: monitoring.db
provisionResources: true
provisioning:
  provisioningMaxWallTime: 1-00:00:00
